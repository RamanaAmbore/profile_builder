<g font-family="JetBrains Mono, monospace" font-size="10" opacity="0.32">
<text x="30" y="690" fill="#1d4ed8">def price_call(S, K, T, r, σ):</text>
<text x="30" y="705" fill="#475569">    d1 = (log(S/K) + (r+σ²/2)*T)</text>
<text x="30" y="720" fill="#475569">         / (σ * sqrt(T))</text>
<text x="30" y="735" fill="#059669">    return S*N(d1) - K*exp(-rT)*N(d2)</text>
</g>
