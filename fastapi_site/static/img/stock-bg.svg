<g font-family="JetBrains Mono, monospace" font-size="11" opacity="0.48">
<text x="140" y="640" fill="#1d4ed8">def price_call(S, K, T, r, σ):</text>
<text x="140" y="656" fill="#475569">    d1 = (log(S/K) + (r+σ²/2)*T)</text>
<text x="140" y="672" fill="#475569">         / (σ * sqrt(T))</text>
<text x="140" y="688" fill="#059669">    return S*N(d1) - K*exp(-rT)*N(d2)</text>
