<g font-family="JetBrains Mono, monospace" opacity="0.42">
<text x="60" y="200" font-size="13" fill="#1d4ed8">C = SВ·N(dвӮҒ) вҲ’ KВ·e^(вҲ’rT)В·N(dвӮӮ)</text>
<text x="560" y="180" font-size="13" fill="#059669">О” = N(dвӮҒ)</text>
<text x="800" y="200" font-size="13" fill="#0891b2">О“ = N'(dвӮҒ) / (SВ·ПғВ·вҲҡT)</text>
<text x="1100" y="180" font-size="13" fill="#14b8a6">ОҪ = SВ·N'(dвӮҒ)В·вҲҡT</text>
<text x="1340" y="200" font-size="12" fill="#475569">ПҒ = KВ·TВ·e^(вҲ’rT)В·N(dвӮӮ)</text>
<text x="60" y="360" font-size="13" fill="#0891b2">dвӮҒ = [ln(S/K) + (r+ПғВІ/2)T] / ПғвҲҡT</text>
<text x="560" y="360" font-size="13" fill="#059669">dвӮӮ = dвӮҒ вҲ’ ПғвҲҡT</text>
<text x="820" y="340" font-size="13" fill="#1d4ed8">max(SвҲ’K, 0)</text>
<text x="820" y="380" font-size="13" fill="#14b8a6">max(KвҲ’S, 0)</text>
<text x="1080" y="360" font-size="12" fill="#475569">C вҲ’ P = S вҲ’ KВ·e^(вҲ’rT)</text>
<text x="1340" y="360" font-size="12" fill="#047857">dS = ОјSВ·dt + ПғSВ·dW</text>
<text x="60" y="540" font-size="13" fill="#059669">Оҳ = вҲ’(SВ·N'(dвӮҒ)В·Пғ)/(2вҲҡT) вҲ’ rKe^(вҲ’rT)В·N(dвӮӮ)</text>
<text x="640" y="540" font-size="12" fill="#0891b2">E[max(S_T вҲ’ K, 0)] = e^(rT)В·C</text>
<text x="1000" y="540" font-size="12" fill="#1d4ed8">Пғ_impl = BSвҒ»В№(C_mkt, S, K, T, r)</text>
<text x="1350" y="540" font-size="13" fill="#14b8a6">Vega = вҲӮC/вҲӮПғ</text>
<text x="60" y="720" font-size="13" fill="#475569">N(x) = (1/вҲҡ(2ПҖ)) вҲ«_{вҲ’вҲһ}^{x} e^(вҲ’tВІ/2) dt</text>
<text x="640" y="720" font-size="13" fill="#0891b2">О”_put = N(dвӮҒ) вҲ’ 1</text>
<text x="900" y="720" font-size="13" fill="#1d4ed8">P = KВ·e^(вҲ’rT)В·N(вҲ’dвӮӮ) вҲ’ SВ·N(вҲ’dвӮҒ)</text>
<text x="1300" y="720" font-size="12" fill="#059669">вҲӮВІC/вҲӮSВІ = N'(dвӮҒ)/(SПғвҲҡT)</text>
<text x="60" y="870" font-size="12" fill="#475569">r_f + ОІ(r_m вҲ’ r_f)</text>
<text x="340" y="870" font-size="12" fill="#1d4ed8">Sharpe = (E[R] вҲ’ r_f) / Пғ</text>
<text x="700" y="870" font-size="12" fill="#059669">VaR = Ој вҲ’ zВ·Пғ</text>
<text x="940" y="870" font-size="12" fill="#0891b2">Kelly f* = (bp вҲ’ q) / b</text>
<text x="1200" y="870" font-size="10" fill="#475569">Black-Scholes PDE: вҲӮV/вҲӮt + ВҪПғВІSВІвҲӮВІV/вҲӮSВІ + rSвҲӮV/вҲӮS вҲ’ rV = 0</text>
