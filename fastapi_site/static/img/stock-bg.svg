<g font-family="JetBrains Mono, monospace" opacity="0.55">
<text x="440" y="868" font-size="14" fill="#1d4ed8" font-weight="500">C = S·N(d₁) − K·e^(−rT)·N(d₂)</text>
<text x="880" y="868" font-size="14" fill="#059669" font-weight="500">d₁ = [ln(S/K) + (r+σ²/2)T] / σ√T</text>
</g>
<g font-family="JetBrains Mono, monospace" font-size="12" opacity="0.42" fill="#475569">
<text x="450" y="60">Δ_call = N(d₁)</text>
<text x="650" y="60">Γ = N'(d₁) / (Sσ√T)</text>
<text x="920" y="60">ν = S·N'(d₁)·√T</text>
<text x="1180" y="60">Θ = −(S·N'(d₁)·σ)/(2√T) − rKe^(−rT)·N(d₂)</text>
</g>
<g font-family="JetBrains Mono, monospace" font-size="11" opacity="0.50">
<text x="150" y="620" fill="#1d4ed8">def price_call(S, K, T, r, σ):</text>
<text x="150" y="637" fill="#475569">    d1 = (log(S/K) + (r + σ²/2)*T)</text>
<text x="150" y="654" fill="#475569">         / (σ * sqrt(T))</text>
<text x="150" y="671" fill="#475569">    d2 = d1 - σ*sqrt(T)</text>
<text x="150" y="688" fill="#059669">    return S*N(d1) - K*exp(-r*T)*N(d2)</text>
</g>
