        Billing Platform Modernization - Fee Calculation Engine:
          role: Principal System Analyst
          start: Oct 2025
          end: Till Date
          duration: 6 months
          technology: Python, AWS Lambda, Step Functions, Kafka, Snowflake, Airflow, dbt, Terraform, SQL, Git, Jenkins
          summary: |
            Modernizing Fidelity's firm-wide billing platform — the mission-critical engine that
            computes and reconciles advisory, custody, brokerage, and retirement fees across millions
            of client accounts and billions of transactions annually. Re-architecting legacy overnight
            batch billing into a cloud-native, event-driven distributed platform on AWS and Snowflake
            with strict SEC/FINRA regulatory compliance, full audit traceability, and near-real-time
            fee visibility. Replacing monolithic batch jobs with horizontally-scalable Lambda and
            Step Function workflows that complete a fraction of legacy runtime.
          additional information: |
            **Project: Billing Platform Modernization — Fee Calculation Engine**

            **Client:** Fidelity Investments, USA (engaged via Fidelity Talent Source)

            **Business Context:** Fidelity's billing platform is a mission-critical, firm-wide system
            that computes fees across every revenue-generating product line — advisory programs, managed
            accounts, custody, brokerage, mutual funds, and retirement plans. The legacy system processes
            enormous daily volumes under tight SLAs and strict regulatory requirements (SEC Rule 206(4)-2,
            FINRA books-and-records, SOX auditability), with zero tolerance for miscalculation.

            **Key Focus Areas:**

            * **Distributed Fee Calculation Engine:** Designing a scalable compute layer on AWS (Lambda,
              Step Functions, ECS) to process tiered, asset-based, transaction-based, and flat-fee
              calculations in parallel — replacing legacy overnight batch jobs with event-driven,
              horizontally-scalable workflows that complete in a fraction of the time.
            * **Snowflake as Source of Truth:** Modeling account positions, transaction history, fee
              schedules, rate cards, and billing cycles in Snowflake — enabling elastic compute for
              heavy month-end runs, ad-hoc analytics, and sub-second lookups for reconciliation.
              Leveraging Snowflake's time-travel, zero-copy cloning, and data sharing for safe testing
              and downstream distribution.
            * **Fee Schedule Flexibility:** Supporting complex fee structures — tiered break-points,
              asset-based fees, transaction commissions, flat fees, waivers, discounts, householding,
              pro-rata adjustments, and client-specific overrides — all version-controlled and
              audit-logged.
            * **Reconciliation & Data Integrity:** Building parallel-run validation frameworks to
              compare new-platform output against legacy billing line-by-line, guaranteeing zero
              regression during the migration. Automated reconciliation dashboards, variance alerts,
              and full lineage tracking from source transaction to billed amount.
            * **Regulatory & Audit Readiness:** Implementing immutable audit trails, change history,
              and deterministic replay so every fee can be traced end-to-end — critical for SEC exams,
              internal audit, and client-dispute resolution.
            * **Cloud-Native Architecture:** Event-driven services (Kafka, EventBridge), infrastructure
              as code (Terraform), observable and cost-efficient compute, orchestration via Airflow and
              dbt for data transformations.
            * **Developer Velocity:** CI/CD pipelines, automated test suites (including property-based
              and golden-file tests for fee logic), and observability (metrics, logs, traces) so teams
              can change billing rules safely and ship multiple times per day.

            **Technology Stack:** Python, AWS (Lambda, S3, Step Functions, ECS, EventBridge, Kafka/MSK),
            Snowflake, Airflow, dbt, Terraform, SQL, Git, Jenkins.

