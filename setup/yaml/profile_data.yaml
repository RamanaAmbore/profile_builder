      A production-grade FinTech SaaS platform built for RamboQuant Analytics LLP
      (ramboq.com) — demonstrating full-stack FinTech and quant engineering skills,
      not a personal trading system. The platform combines AI-powered market intelligence
      (Google Gemini 2.5 Flash with Search grounding), an equity-options algorithmic
      trading engine with Black-Scholes pricing, Greeks-driven signals (Δ, Γ, Θ, ν, ρ),
      and implied volatility band strategies, and real-time multi-account portfolio
      tracking across NSE/NFO and MCX markets. Includes a full partner ecosystem with
