profile: |
  Principal FinTech engineer and quant developer with 30+ years of experience
  modernizing mission-critical financial systems, building algorithmic trading
  platforms, and delivering cloud-native data solutions at enterprise scale.
  FRM-certified (GARP, 2022) with deep, working knowledge of options pricing
  (Black-Scholes), Greeks (Δ, Γ, Θ, ν, ρ), implied volatility surfaces, and
  derivatives risk — applied in a live algorithmic trading platform.
  CFA Levels 1 & 2 cleared; pursuing Level 3. Fluent across Python, Java,
  Spark, AWS, and Snowflake; actively applying Gen AI tooling (LLMs, Claude Code)
  to accelerate modernization and code-analysis workflows. Recipient of the
  NTT Innovation Award, ranked among the top 40 innovators globally.
  Built an in-house legacy modernization toolkit — Rambo (mainframe dependency
  analytics), Cobra (COBOL AST parser and data-lineage engine), and automated
  VSAM-to-DB2 re-engineering — delivering the full decommissioning lifecycle
  without third-party tooling. U.S. work-authorized — no visa sponsorship required.
experience summary:
  - Architecting a distributed fee-calculation engine at Fidelity Investments on
    AWS (Lambda, Step Functions) and Snowflake — replacing overnight batch billing
    with an event-driven, horizontally-scalable platform processing billions of
    transactions annually across advisory, custody, and retirement products.
  - Built 'Rambo,' a Python/Streamlit dependency-analytics platform that provided
    critical insights into 3,000+ mainframe batch jobs, enabling their systematic
    decommissioning and cutting legacy-maintenance overhead significantly.
  - Received the NTT Delivery Excellence Award for Innovation — designed a
    Python-based product suite that automated COBOL-VSAM to COBOL-DB2
    re-engineering, ranked top 40 globally within NTT DATA.
  - Built the COBOL parsing engine for Cobra — performs lexical/syntax analysis,
    constructs an AST, tracks full data lineage, and maps field origin and
    transformation across millions of lines of legacy COBOL code.
  - Building a live algorithmic trading platform for equity options integrating
    Black-Scholes pricing, implied volatility bands, and Greeks-driven signals
    (Δ, Γ, Θ) with automated execution via the KiteConnect API for covered-call
    and volatility-entry strategies.
  - Built and operate an in-house legacy modernization toolkit — Rambo
    (mainframe dependency-graph analytics), Cobra (COBOL AST parser and
    data-lineage engine), and automated VSAM-to-DB2 re-engineering — covering
    the full lifecycle from mainframe artifact discovery to systematic
    decommissioning; Gen AI (LLMs, Claude Code) now accelerates COBOL analysis
    and documentation at scale.
