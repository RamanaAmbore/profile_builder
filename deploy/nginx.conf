# /etc/nginx/sites-available/ramanaambore.me
#
# nginx site config for the portfolio site.
# - HTTPS via certbot-managed Let's Encrypt
# - Reverse-proxies / to the uvicorn process on 127.0.0.1:8002
# - Serves /static/ and /images/ directly off disk (faster than proxying)
#
# After changes:
#   sudo cp deploy/nginx.conf /etc/nginx/sites-available/ramanaambore.me
#   sudo nginx -t && sudo systemctl reload nginx

server {
    server_name ramanaambore.me www.ramanaambore.me;

    # Static assets served directly off disk (bypass uvicorn)
    location /static/ {
        alias /opt/streamlit_profile_builder/fastapi_site/static/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800, immutable";
    }

    location /images/ {
        alias /opt/streamlit_profile_builder/setup/images/;
        expires 7d;
        access_log off;
        add_header Cache-Control "public, max-age=604800";
    }

    # Everything else → FastAPI (uvicorn on port 8002)
    location / {
        proxy_pass http://127.0.0.1:8002;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
    }

    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/javascript application/json image/svg+xml application/xml+rss;

    client_max_body_size 8m;

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/ramanaambore.me/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/ramanaambore.me/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

server {
    if ($host = www.ramanaambore.me) { return 308 https://$host$request_uri; }
    if ($host = ramanaambore.me)     { return 308 https://$host$request_uri; }

    listen 80;
    server_name ramanaambore.me www.ramanaambore.me;
    return 308;
}
